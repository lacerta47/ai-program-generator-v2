name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-program-generator
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-program-generator/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type check
        run: ./node_modules/.bin/tsc --noEmit

      - name: Production build
        run: npm run build
        # 빌드 시점엔 실제 비밀키 불필요(런타임에만 사용). 클라이언트 Firebase init이
        # 빈 값에서 깨지지 않도록 더미 NEXT_PUBLIC_* 만 주입한다(네트워크 호출 없음).
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "0"
          NEXT_PUBLIC_FIREBASE_APP_ID: ci-dummy
